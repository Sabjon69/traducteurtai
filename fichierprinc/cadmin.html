<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panneau Admin – Expert Sabjon</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="icon" type="image/png" href="/img/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reveal { opacity: 0; animation: fadeInUp 0.8s ease-out forwards; }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        
        .dot-notif { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            min-width: 18px; 
            height: 18px; 
            padding: 0 5px;
            background-color: #ef4444; 
            color: white;
            font-size: 10px;
            font-weight: bold;
            border-radius: 999px; 
            margin-left: 8px;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #d8c09d; border-radius: 10px; }
        
        .bubble-admin { background-color: #1e213a; color: #d8c09d; border-radius: 15px 15px 2px 15px; }
        .bubble-client { background-color: #ffffff; color: #1e213a; border-radius: 15px 15px 15px 2px; border: 1px solid #e5e7eb; }
        
        #chatFileInput { display: none; }
        .file-label { cursor: pointer; transition: all 0.2s; }
        .file-label:hover { color: #d8c09d; transform: scale(1.1); }

        .animate-fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

<body class="bg-[#F9F7F2] min-h-screen font-sans">

<header class="reveal">
    <nav class="bg-[#1e213a] py-4 px-6 md:px-12 border-b border-[#d8c09d]/20 shadow-lg">
        <div class="max-w-[1600px] mx-auto flex justify-between items-center">
            <a href="/" class="flex items-center gap-4">
                <div class="w-12 h-12 md:w-16 md:h-16 rounded-full border-2 border-[#d8c09d] flex items-center justify-center text-[#d8c09d]">
                    <img src="/img/logo.png" alt="">
                </div>
                <div class="text-[#d8c09d] font-serif uppercase tracking-widest text-xs md:text-base leading-tight">
                    Traducteur<br>Expert<br>Thaïlandaise
                </div>
            </a>
            <a href="/" class="text-[#d8c09d] border border-[#d8c09d] px-4 py-2 rounded-sm text-xs uppercase tracking-widest hover:bg-[#d8c09d] hover:text-[#1e213a] transition-all font-bold">
                Déconnexion
            </a>
        </div>
    </nav>
</header>

<main class="max-w-[1600px] mx-auto py-12 px-6 md:px-12">
    <h1 class="text-3xl font-serif text-[#1e213a] mb-8 reveal delay-1 uppercase tracking-widest font-bold">
        Console d'Administration
    </h1>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12 reveal delay-2">
        <div class="lg:col-span-1 bg-[#1e213a] p-8 rounded-lg shadow-2xl text-[#d8c09d]">
            <h2 class="text-xl font-serif uppercase tracking-widest mb-6 border-b border-[#d8c09d]/30 pb-4">
                Livraison Rapide
            </h2>
            <form id="formLivraison" action="/envoyermessage" method="POST" enctype="multipart/form-data" class="space-y-5">
                <div>
                    <label class="block text-[10px] uppercase font-bold mb-2">Destinataire (Rechercher ou saisir)</label>
                    <input list="clientsList" id="destinataireInput" name="client_email" required 
                           placeholder="Taper l'email..." 
                           class="w-full bg-[#2c2e43] border border-[#d8c09d]/30 p-3 text-sm outline-none focus:border-[#d8c09d] text-white rounded-sm">
                    <datalist id="clientsList"></datalist>
                </div>
                <div>
                    <label class="block text-[10px] uppercase font-bold mb-2">Type de document</label>
                    <select name="message" class="w-full bg-[#2c2e43] border border-[#d8c09d]/30 p-3 text-sm outline-none focus:border-[#d8c09d]">
                        <option value="Voici votre traduction terminée.">Traduction officielle</option>
                        <option value="Voici le scan de votre document">Documents</option>
                        <option value="Veuillez trouver la facture correspondante.">Facture / Devis</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] uppercase font-bold mb-2">Fichier à transmettre</label>
                    <input type="file" name="document" required class="text-xs w-full file:bg-[#d8c09d] file:text-[#1e213a] file:border-0 file:px-3 file:py-2 file:rounded-sm file:font-bold cursor-pointer">
                </div>
                <button type="submit" class="w-full bg-[#d8c09d] text-[#1e213a] py-4 font-black uppercase text-[10px] tracking-[0.2em] hover:bg-white transition-all shadow-2xl">
                    Envoyer le document
                </button>
            </form>
        </div>

        <div class="lg:col-span-2 bg-white shadow-xl rounded-lg overflow-hidden border border-gray-100">
            <div class="p-6 border-b border-gray-100 flex items-center justify-between">
                <h2 class="text-lg font-serif text-[#1e213a] uppercase tracking-widest font-bold">
                    Dernières demandes <span id="notifDemandes" class="hidden dot-notif animate-pulse">0</span>
                </h2>
            </div>
            <div class="overflow-x-auto max-h-[350px]">
                <table class="w-full text-left border-collapse" id="tableDemandes">
                    <thead class="sticky top-0 bg-[#F9F7F2] z-10">
                        <tr class="text-[#1e213a] text-[10px] uppercase tracking-widest font-bold">
                            <th class="p-4 border-b border-gray-200">Client</th>
                            <th class="p-4 border-b border-gray-200">Type</th>
                            <th class="p-4 border-b border-gray-200">Date</th>
                            <th class="p-4 border-b border-gray-200 text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody class="text-xs"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-8 reveal">
        <div class="lg:col-span-1 space-y-6">
            <div class="bg-white shadow-lg rounded-lg p-6 border border-gray-100">
                <h2 class="text-[10px] uppercase font-bold mb-4 flex items-center">
                    Conversations <span id="notifMessages" class="hidden dot-notif animate-pulse">0</span>
                </h2>
                <input type="text" id="searchInput" placeholder="Rechercher un chat..." class="w-full border-b border-gray-300 py-2 outline-none focus:border-[#d8c09d] text-sm italic">
            </div>
            <div id="listeClientsMessages" class="space-y-2 max-h-[400px] overflow-y-auto pr-2"></div>
        </div>

        <div class="lg:col-span-3">
            <div class="bg-white shadow-2xl rounded-lg p-8 h-full flex flex-col border border-gray-100">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 border-b pb-4 gap-4">
                    <div class="w-full md:w-auto">
                        <h2 id="chatTitle" class="text-xl font-serif text-[#1e213a] uppercase tracking-widest font-bold">Chat Live</h2>
                        <div class="flex items-center gap-2 mt-2">
                            <span class="text-[10px] font-bold uppercase text-gray-400">À :</span>
                            <input type="email" id="adminClientEmailDisplay" placeholder="choisir ou taper email..." 
                                   class="text-[11px] font-bold text-[#1e213a] border-b border-dotted border-gray-400 outline-none focus:border-[#d8c09d] bg-transparent w-full md:w-64"
                                   oninput="syncEmail(this.value)">
                        </div>
                    </div>
                    <div id="chatFilters" class="hidden flex gap-2">
                        <button onclick="chargerMessagesAdmin('all_docs')" class="text-[9px] font-bold bg-gray-100 px-3 py-1.5 uppercase hover:bg-gray-200 rounded-sm">Docs</button>
                        <button onclick="chargerMessagesAdmin(null)" class="text-[9px] font-bold bg-[#1e213a] text-white px-3 py-1.5 uppercase rounded-sm">Tout</button>
                    </div>
                </div>
                
                <div id="adminMessagesBox" class="h-[400px] overflow-y-auto p-6 bg-[#F9F7F2] rounded-lg mb-6 space-y-4 shadow-inner"></div>
                
                <form id="formAdmin" action="/envoyermessage" method="POST" enctype="multipart/form-data" class="flex items-end gap-4 bg-gray-50 p-3 rounded-lg border border-gray-100">
                    <input type="hidden" id="adminClientEmail" name="client_email">
                    <div class="flex flex-col gap-2 flex-grow">
                        <span id="fileNameDisplay" class="text-[9px] text-blue-600 font-bold hidden truncate max-w-xs"></span>
                        <div class="flex items-center gap-3">
                            <label for="chatFileInput" class="file-label text-gray-400">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="m18.375 12.739-7.693 7.693a4.5 4.5 0 0 1-6.364-6.364l10.94-10.94A3 3 0 1 1 19.5 7.372L8.552 18.32a1.5 1.5 0 0 1-2.121-2.121l10.94-10.94" />
                                </svg>
                            </label>
                            <input type="file" id="chatFileInput" name="document" onchange="updateFileName(this)">
                            <input type="text" name="message" required placeholder="Tapez votre message..." class="w-full border-none outline-none text-sm bg-transparent">
                        </div>
                    </div>
                    <button type="submit" class="bg-[#1e213a] text-[#d8c09d] px-8 py-3 uppercase text-[10px] font-bold tracking-[0.2em] hover:bg-[#d8c09d] hover:text-[#1e213a] transition-all shadow-md">Envoyer</button>
                </form>
            </div>
        </div>
    </div>
</main>

<footer class="bg-[#1e213a] text-gray-500 py-10 mt-12 border-t border-[#d8c09d]/10 font-bold">
    <div class="max-w-[1600px] mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4 text-[10px] uppercase tracking-widest">
        <p>© 2026 Sabjon Mali - Expert Traducteur Agréé</p>
    </div>
</footer>

<script>
    let selectedEmail = null;
    let currentFilter = null;

    function updateFileName(input) {
        const display = document.getElementById('fileNameDisplay');
        if (input.files && input.files.length > 0) {
            display.innerText = "📎 Fichier : " + input.files[0].name;
            display.classList.remove('hidden');
        } else {
            display.classList.add('hidden');
        }
    }

    function syncEmail(val) {
        selectedEmail = val;
        document.getElementById("adminClientEmail").value = val;
        document.getElementById("destinataireInput").value = val;
        if(val.includes('@') && val.includes('.')) {
            chargerMessagesAdmin();
        }
    }

    function chargerDemandes() {
        fetch('/api/demandes')
        .then(res => res.json())
        .then(data => {
            const tbody = document.querySelector('#tableDemandes tbody');
            const dot = document.getElementById('notifDemandes');
            const lastSeenId = parseInt(localStorage.getItem('lastIdDemande') || 0);
            const nouveaux = data.filter(d => d.id > lastSeenId).length;

            if (nouveaux > 0) {
                dot.innerText = nouveaux;
                dot.classList.remove('hidden');
            } else {
                dot.classList.add('hidden');
            }

            tbody.innerHTML = "";
            data.forEach(d => {
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50 border-b border-gray-100 transition-colors cursor-pointer group" onclick="ouvrirChat('${d.email}'); markDemandeRead('${d.id}')">
                        <td class="p-4"><div class="font-bold text-[#1e213a]">${d.nom}</div><div class="text-[10px] text-blue-600">${d.email}</div></td>
                        <td class="p-4"><span class="bg-[#1e213a] text-[#d8c09d] px-2 py-1 rounded text-[9px] font-bold uppercase">${d.type_document}</span></td>
                        <td class="p-4 text-gray-500">${new Date(d.date_envoi).toLocaleDateString()}</td>
                        <td class="p-4 text-center"><span class="opacity-0 group-hover:opacity-100 text-[9px] bg-[#d8c09d] text-[#1e213a] px-2 py-1 rounded font-bold">RÉPONDRE</span></td>
                    </tr>`;
            });
        });
    }

    function markDemandeRead(id) {
        const currentMax = parseInt(localStorage.getItem('lastIdDemande') || 0);
        if (parseInt(id) > currentMax) {
            localStorage.setItem('lastIdDemande', id);
        }
        chargerDemandes();
    }

    function chargerListeMessages() {
        fetch('/api/messages_clients')
        .then(res => res.json())
        .then(data => {
            const box = document.getElementById("listeClientsMessages");
            const dot = document.getElementById('notifMessages');
            const lastSeenTime = localStorage.getItem('lastMsgTime') || "1970-01-01T00:00:00";
            
            const nouveaux = data.filter(c => new Date(c.last_message) > new Date(lastSeenTime)).length;

            if (nouveaux > 0) {
                dot.innerText = nouveaux;
                dot.classList.remove('hidden');
                document.title = `(${nouveaux}) Panneau Admin`;
            } else {
                dot.classList.add('hidden');
                document.title = "Panneau Admin – Expert Sabjon";
            }

            box.innerHTML = "";
            const dl = document.getElementById("clientsList");
            dl.innerHTML = "";

            data.forEach(c => {
                const isActive = selectedEmail === c.client_email;
                const isNew = new Date(c.last_message) > new Date(lastSeenTime);
                
                box.innerHTML += `
                    <div class="group p-4 bg-white border rounded-lg shadow-sm transition-all cursor-pointer border-gray-100 ${isActive ? 'ring-2 ring-[#d8c09d] bg-[#F9F7F2]' : 'hover:border-[#d8c09d]'}" 
                         onclick="ouvrirChat('${c.client_email}'); markMsgRead('${c.last_message}')">
                        <div class="flex justify-between items-start">
                            <p class="font-bold text-xs text-[#1e213a] truncate">${c.client_email}</p>
                            ${isNew ? '<span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>' : ''}
                        </div>
                        <p class="text-[8px] text-gray-400 mt-1 uppercase">${new Date(c.last_message).toLocaleString()}</p>
                    </div>`;
                dl.innerHTML += `<option value="${c.client_email}">`;
            });
        });
    }

    function markMsgRead(time) {
        localStorage.setItem('lastMsgTime', time);
        chargerListeMessages(); 
    }

    function ouvrirChat(email) {
        selectedEmail = email;
        document.getElementById("adminClientEmail").value = email;
        document.getElementById("adminClientEmailDisplay").value = email;
        document.getElementById("destinataireInput").value = email;
        document.getElementById("chatFilters").classList.remove("hidden");
        currentFilter = null;
        chargerMessagesAdmin();
        chargerListeMessages();
    }

    function chargerMessagesAdmin(filterType = null) {
        if (!selectedEmail || selectedEmail === "") return;
        if (filterType !== undefined) currentFilter = filterType;

        fetch(`/api/messages/${selectedEmail}`)
        .then(res => res.json())
        .then(data => {
            const box = document.getElementById("adminMessagesBox");
            if (currentFilter === 'all_docs') data = data.filter(m => m.document_url);

            box.innerHTML = data.length === 0 ? '<p class="text-center text-gray-400 mt-10 italic text-[10px] uppercase tracking-widest">Aucun message</p>' : "";
            
            data.forEach(msg => {
                const isClient = msg.expediteur === "client";
                const docHtml = msg.document_url ? `
                    <div class="mt-3 pt-3 border-t border-black/5">
                        <a href="/${msg.document_url}" target="_blank" class="flex items-center gap-2 bg-white/20 p-2 rounded hover:bg-white/40 transition">
                            <span class="text-[9px] font-black uppercase bg-red-500 text-white px-1.5 py-0.5 rounded">Fichier</span>
                            <span class="text-[10px] font-bold underline truncate max-w-[150px]">Consulter</span>
                        </a>
                    </div>` : "";
                
                box.innerHTML += `
                    <div class="flex ${isClient ? 'justify-start' : 'justify-end'} animate-fade-in">
                        <div class="max-w-[75%] p-4 shadow-sm ${isClient ? 'bubble-client' : 'bubble-admin'}">
                            <p class="leading-relaxed text-sm">${msg.message}</p>
                            ${docHtml}
                            <div class="mt-2 flex items-center justify-end opacity-40 text-[7px] font-bold uppercase">
                                <span>${new Date(msg.date_envoi).toLocaleString()}</span>
                            </div>
                        </div>
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        document.querySelectorAll('#listeClientsMessages > div').forEach(div => {
            div.style.display = div.textContent.toLowerCase().includes(term) ? 'block' : 'none';
        });
    });

    chargerDemandes();
    chargerListeMessages();
    setInterval(chargerDemandes, 10000);
    setInterval(chargerListeMessages, 5000);
    setInterval(() => { if(!currentFilter && selectedEmail) chargerMessagesAdmin(); }, 3000);

    document.getElementById('formAdmin').addEventListener('submit', function() {
        const now = new Date().toISOString();
        localStorage.setItem('lastMsgTime', now); 

        setTimeout(() => {
            document.getElementById('fileNameDisplay').classList.add('hidden');
            this.reset();
            document.getElementById("adminClientEmail").value = selectedEmail;
            chargerListeMessages();
        }, 500);
    });
</script>

</body>
</html>
