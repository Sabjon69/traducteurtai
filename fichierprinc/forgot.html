<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Récupération de compte</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="icon" type="image/svg+xml" href="../img/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --font-serif: "Playfair Display", serif;
            --font-sans: "Lato", sans-serif;
        }
        body { font-family: var(--font-sans); }
        h1, h2, .serif-font { font-family: var(--font-serif); }
        
        .reveal { 
            animation: fadeInUp 0.8s ease-out forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-[#F9F7F2] min-h-screen flex flex-col">

    <header class="relative z-20">
        <nav class="bg-[#1e213a] py-4 px-6 md:px-12 w-full border-b border-[#d8c09d]/20">
            <div class="max-w-[1600px] mx-auto flex justify-between items-center">
                <a href="/index.html">
                                <div class="flex items-center gap-4">
                <div class="w-12 h-12 md:w-16 md:h-16 rounded-full border-2 border-[#d8c09d] flex items-center justify-center bg-transparent text-[#d8c09d]">
                    <img src="../img/logo.png" alt="">
                </div>
                <div class="text-[#d8c09d] font-serif uppercase tracking-widest leading-tight text-xs md:text-base">
                    Traducteur<br>Expert<br>Thaïlandaise
                </div>
            </div>
                </a>
                <div class="hidden md:flex items-center gap-8">
                    <a href="/index.html" class="text-white/80 hover:text-[#d8c09d] text-xs uppercase tracking-widest transition">Accueil</a>
                    <a href="/loginclient.html" class="px-5 py-2 border border-[#d8c09d] text-[#d8c09d] text-xs uppercase tracking-widest hover:bg-[#d8c09d] hover:text-[#1e213a] transition rounded-sm">Connexion</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="bg-white w-full max-w-md p-8 md:p-10 rounded-2xl shadow-2xl shadow-emerald-900/5 reveal">
            
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-50 rounded-full mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8 text-emerald-600">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 0 1 3 3m3 0a6 6 0 0 1-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1 1 21.75 8.25Z" />
                    </svg>
                </div>
                <h2 class="text-2xl font-semibold text-[#1e213a]">Mot de passe oublié ?</h2>
                <p class="text-gray-500 text-sm mt-2">Entrez votre email pour recevoir un lien de réinitialisation sécurisé.</p>
            </div>

            <form id="forgotForm" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-gray-700 mb-2">Votre adresse email</label>
                    <input type="email" id="email" required 
                        class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all"
                        placeholder="exemple@mail.com">
                </div>

                <button type="submit" id="submitBtn"
                        class="w-full py-4 rounded-xl bg-emerald-600 text-white text-sm font-bold uppercase tracking-widest hover:bg-emerald-700 shadow-lg transition-all">
                    Envoyer les instructions
                </button>
            </form>

            <div id="statusMessage" class="mt-6 hidden text-center p-4 rounded-xl text-sm font-medium"></div>

            <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                <a href="loginclient.html" class="text-sm text-gray-500 hover:text-emerald-600 transition flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
                    </svg>
                    Retour à la connexion
                </a>
            </div>
        </div>
    </main>

    <footer class="bg-gray-900 text-gray-300 py-10">
        <div class="max-w-6xl mx-auto px-4 text-center">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="text-left">
                    <p class="text-sm tracking-widest uppercase font-bold text-white">Sabjon Mali</p>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest">Expert près la Cour d'Appel</p>
                </div>
                <div class="flex gap-8 text-[10px] uppercase tracking-[0.2em]">
                    <a href="#" class="hover:text-[#d8c09d] transition">Mentions légales</a>
                    <a href="contact.html" class="hover:text-[#d8c09d] transition">Contact</a>
                </div>
            </div>
            <div class="mt-8 border-t border-gray-800 pt-6 text-[10px] text-gray-600 uppercase tracking-[0.3em]">
                &copy; 2026 — Traducteur Expert Thaïlandais
            </div>
        </div>
    </footer>




    <script>
document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('statusMessage');

    // état de chargement
    btn.disabled = true;
    btn.innerText = "Envoi en cours...";
    msg.classList.add('hidden');

    try {
        const response = await fetch('/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });

        const result = await response.text();

        msg.classList.remove('hidden');
        if (response.ok && result.includes("envoyé")) {
            msg.className = "mt-6 text-center p-4 rounded-xl text-sm font-medium bg-emerald-50 text-emerald-700 border border-emerald-100";
            msg.innerHTML = "✓ " + result;
            document.getElementById('forgotForm').reset();
        } else {
            msg.className = "mt-6 text-center p-4 rounded-xl text-sm font-medium bg-red-50 text-red-700 border border-red-100";
            msg.innerHTML = "✕ " + result;
        }
    } catch (err) {
        msg.className = "mt-6 text-center p-4 rounded-xl text-sm font-medium bg-red-50 text-red-700 border border-red-100";
        msg.innerText = "Erreur de connexion au serveur.";
    } finally {
        btn.disabled = false;
        btn.innerText = "Envoyer les instructions";
    }
});
</script>

</body>
</html>
