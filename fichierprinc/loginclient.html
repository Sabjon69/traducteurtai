<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Client</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="icon" type="image/png" href="/img/logo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reveal { opacity: 0; animation: fadeInUp 0.8s ease-out forwards; }
        .delay-1 { animation-delay: 0.2s; }
    </style>
</head>
<body class="bg-[#F9F7F2] min-h-screen flex flex-col">

    <header class="reveal">
<nav class="bg-[#1e213a] py-4 px-6 md:px-12 w-full sticky top-0 z-50 border-b border-[#d8c09d]/20">
    <div class="max-w-[1600px] mx-auto flex justify-between items-center">
        <a href="/" class="hover:opacity-80 transition-opacity">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 md:w-16 md:h-16 rounded-full border-2 border-[#d8c09d] flex items-center justify-center bg-transparent text-[#d8c09d]">
                   <img src="/img/logo.png" alt="">
                </div>
                <div class="text-[#d8c09d] font-serif uppercase tracking-widest leading-tight text-xs md:text-base">
                    Traducteur<br>Expert<br>Thaïlandais
                </div>
            </div>
        </a>

        <button id="menu-btn" class="md:hidden text-[#d8c09d] focus:outline-none">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
            </svg>
        </button>

        <div id="menu-links" class="hidden absolute top-full left-0 w-full bg-[#1e213a] border-b border-[#d8c09d]/20 p-6 flex-col space-y-4 md:static md:w-auto md:bg-transparent md:border-none md:p-0 md:flex md:flex-row md:items-center md:space-y-0 md:space-x-6 text-white/90 text-sm font-medium tracking-wide z-50">
            <a href="/" class="hover:text-[#d8c09d] transition-colors block">Accueil</a>
            <a href="/service" class="hover:text-[#d8c09d] transition-colors block">Services</a>
            <a href="/contact" class="hover:text-[#d8c09d] transition-colors block">Contact</a>
            
            <div class="flex flex-col md:flex-row gap-4 pt-4 md:pt-0">
                <a href="/loginclient" class="px-5 py-2 border border-[#d8c09d] text-[#d8c09d] hover:bg-[#d8c09d] hover:text-[#1e213a] transition-all duration-300 rounded-sm text-xs font-bold uppercase tracking-widest text-center">
                    Espace Client
                </a>
                <a href="/loginadmin" class="px-5 py-2 border border-white/30 text-white hover:bg-white hover:text-[#1e213a] transition-all duration-300 rounded-sm text-xs font-bold uppercase tracking-widest text-center">
                    Espace Admin
                </a>
            </div>
        </div>
    </div>
</nav>

<script>
    const btn = document.getElementById('menu-btn');
    const menu = document.getElementById('menu-links');

    btn.addEventListener('click', () => {
        menu.classList.toggle('hidden');
        menu.classList.toggle('flex');
    });
</script>
    </header>
    
    <main class="flex-grow flex items-center justify-center px-4 py-12">

        <div class="bg-white shadow-xl border border-gray-100 rounded-2xl p-8 max-w-md w-full reveal delay-1">

            <div class="flex justify-center mb-6">
                <div class="w-20 h-20 bg-emerald-50 rounded-full flex items-center justify-center text-emerald-600">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-10 h-10">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                    </svg>
                </div>
            </div>

            <h1 class="text-[#1e213a] font-serif text-2xl font-bold text-center mb-2">Espace Client</h1>
            <p class="text-sm text-gray-500 text-center mb-8">
                Connectez-vous pour suivre vos traductions et documents
            </p>

            <form class="space-y-5" action="/login" method="POST">

                <div>
                    <label class="block text-sm font-semibold text-[#1e213a] mb-1.5">Adresse e-mail</label>
                    <input type="email" name="email" required
                           class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all"
                           placeholder="nom@exemple.com" />
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <label class="text-sm font-semibold text-[#1e213a]">Mot de passe</label>
                        <a href="/forgot" class="text-xs text-emerald-600 hover:underline">Oublié ?</a>
                    </div>
                    <input type="password" name="password" required
                           class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all"
                           placeholder="••••••••" />
                </div>

                <div class="pt-2">
                    <button type="submit"
                            class="w-full py-3.5 rounded-xl bg-emerald-600 text-white text-sm font-bold uppercase tracking-widest hover:bg-emerald-700 shadow-lg shadow-emerald-200 transition-all active:scale-[0.98]">
                        Se connecter
                    </button>
                </div>

            </form>

            <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                <p class="text-sm text-gray-600">
                    Pas encore de compte ? 
                    <a href="/creeuncompte" class="text-emerald-600 font-bold hover:underline">Créer un compte</a>
                </p>
            </div>

        </div>

    </main>

<footer class="bg-gray-900 text-gray-300 py-10 ">
  <div class="max-w-6xl mx-auto px-4">

    <div class="flex flex-col md:flex-row items-center justify-between gap-6">

      <a href="#" class="text-sm tracking-wide hover:text-white transition">
        Mentions légales
      </a>

      <p class="text-sm tracking-wide">
        © 2026 — <span class="font-semibold text-white">Sabjon Mali</span>
      </p>

    </div>

    <div class="mt-6 border-t border-gray-700 pt-4 text-center text-xs text-gray-500">
      Tous droits réservés.
    </div>

  </div>
</footer>

</body>
</html>
