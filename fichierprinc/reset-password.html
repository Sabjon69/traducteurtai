<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe — Sabjon Mali</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="icon" type="image/png" href="/img/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --font-serif: "Playfair Display", serif;
            --font-sans: "Lato", sans-serif;
        }
        body { font-family: var(--font-sans); }
        h1, h2, .serif-font { font-family: var(--font-serif); }
        
        .reveal { 
            animation: fadeInUp 0.8s ease-out forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-[#F9F7F2] min-h-screen flex flex-col">

    <header class="relative z-20">
    <nav class="bg-[#1e213a] py-4 px-6 md:px-12 border-b border-[#d8c09d]/20">
        <div class="max-w-[1600px] mx-auto flex justify-between items-center">

            <a href="/" class="flex items-center gap-4">
                <div class="w-12 h-12 md:w-16 md:h-16 rounded-full border-2 border-[#d8c09d] flex items-center justify-center text-[#d8c09d]">
                    <img src="/img/logo.png" alt="">
                </div>
                <div class="text-[#d8c09d] font-serif uppercase tracking-widest text-xs md:text-base">
                    Traducteur<br>Expert<br>Thaïlandaise
                </div>
            </a>

            <a href="/loginclient" class="text-[#d8c09d] border border-[#d8c09d] px-4 py-2 rounded-sm text-xs uppercase tracking-widest hover:bg-[#d8c09d] hover:text-[#1e213a] transition-all">
                Déconnexion
            </a>
        </div>
    </nav>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="bg-white w-full max-w-md p-8 md:p-10 rounded-2xl shadow-2xl shadow-emerald-900/5 reveal">
            
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 rounded-full mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8 text-[#1e213a]">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                    </svg>
                </div>
                <h2 class="text-2xl font-semibold text-[#1e213a]">Sécurisez votre compte</h2>
                <p class="text-gray-500 text-sm mt-2">Choisissez un nouveau mot de passe robuste pour finaliser la récupération.</p>
            </div>

            <form id="resetForm" class="space-y-6">
                <input type="hidden" id="token" name="token">

                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-gray-700 mb-2">Nouveau mot de passe</label>
                    <div class="relative">
                        <input type="password" id="newPassword" required 
                               class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all placeholder:text-gray-300"
                               placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" 
                        class="w-full py-4 rounded-xl bg-[#1e213a] text-[#d8c09d] text-sm font-bold uppercase tracking-widest hover:bg-[#2a2f52] shadow-lg transition-all active:scale-[0.98]">
                    Mettre à jour le mot de passe
                </button>
            </form>

            <p id="message" class="mt-6 text-center text-sm font-medium min-h-[20px]"></p>
        </div>
    </main>

<footer class="bg-gray-900 text-gray-300 py-10 ">
  <div class="max-w-6xl mx-auto px-4">

    <div class="flex flex-col md:flex-row items-center justify-between gap-6">

      <a href="#" class="text-sm tracking-wide hover:text-white transition">
        Mentions légales
      </a>

      <p class="text-sm tracking-wide">
        © 2026 — <span class="font-semibold text-white">Sabjon Mali</span>
      </p>

    </div>

    <div class="mt-6 border-t border-gray-700 pt-4 text-center text-xs text-gray-500">
      Tous droits réservés.
    </div>

  </div>
</footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        document.getElementById('token').value = token;

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const msgElement = document.getElementById('message');

            msgElement.className = "mt-6 text-center text-sm font-medium text-blue-600";
            msgElement.innerText = "Traitement en cours...";

            try {
                const response = await fetch('/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });

                const result = await response.text();
                
                if (response.ok) {
                    msgElement.className = "mt-6 text-center text-sm font-bold text-emerald-600 p-3 bg-emerald-50 rounded-lg";
                    msgElement.innerText = "✓ Mot de passe modifié ! Redirection...";
                    setTimeout(() => window.location.href = '/loginclient', 2500);
                } else {
                    msgElement.className = "mt-6 text-center text-sm font-bold text-red-600 p-3 bg-red-50 rounded-lg";
                    msgElement.innerText = "✕ " + result;
                }
            } catch (err) {
                msgElement.innerText = "Erreur de connexion au serveur.";
            }
        });
    </script>
</body>
</html>
